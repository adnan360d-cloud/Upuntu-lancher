name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Unzip Project Files
      run: |
        unzip ubuntu-touch-launcher.zip -d extracted_project
        # للتحقق من المجلد الداخلي والانتقال إليه ديناميكياً
        if [ -d "extracted_project/upuntu tutch" ]; then
          mv "extracted_project/upuntu tutch/"* .
        elif [ -d "extracted_project/ubuntu-touch-launcher" ]; then
          mv "extracted_project/ubuntu-touch-launcher/"* .
        else
          mv extracted_project/* .
        fi

    - name: Grant execute permission for gradlew
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
