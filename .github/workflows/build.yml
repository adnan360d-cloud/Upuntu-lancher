name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. فك ضغط ملفات المشروع
    - name: Unzip Project Files
      run: |
        unzip ubuntu-touch-launcher.zip -d extracted_project
        if [ -d "extracted_project/upuntu tutch" ]; then
          mv "extracted_project/upuntu tutch/"* .
        elif [ -d "extracted_project/ubuntu-touch-launcher" ]; then
          mv "extracted_project/ubuntu-touch-launcher/"* .
        else
          mv extracted_project/* .
        fi

    # 2. إنشاء ملف بيئة وهمي لتخطي الأخطاء
    - name: Create Mock Environment File
      run: |
        touch .env.example
        touch .env

    # 3. تعديل الإعدادات لتعطيل الكاش الرسومي المسبب للانهيار في السيرفرات
    - name: Fix Gradle Properties for Headless CI
      run: |
        echo "org.gradle.configuration-cache=false" >> gradle.properties
        echo "kotlin.compiler.execution.strategy=daemon" >> gradle.properties

    # 4. edge إعداد الجافا المتوافقة (إصدار 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 5. توليد واستخدام إصدار Gradle المتوافق المطلوب (9.3.1)
    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    # 6. بناء التطبيق بوضع الـ Daemon المستقر بالسيرفرات
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 7. رفع ملف الـ APK النهائي للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
