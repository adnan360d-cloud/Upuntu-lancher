name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. فك ضغط ملفات المشروع
    - name: Unzip Project Files
      run: |
        unzip ubuntu-touch-launcher.zip -d extracted_project
        if [ -d "extracted_project/upuntu tutch" ]; then
          mv "extracted_project/upuntu tutch/"* .
        elif [ -d "extracted_project/ubuntu-touch-launcher" ]; then
          mv "extracted_project/ubuntu-touch-launcher/"* .
        else
          mv extracted_project/* .
        fi

    # 2. إنشاء ملف بيئة وهمي لتخطي خطأ (.env.example)
    - name: Create Mock Environment File
      run: |
        touch .env.example
        touch .env

    # 3. إعداد الجافا المتوافقة (إصدار 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. توليد واستخدام إصدار Gradle مستقر ومتوافق (مثل 8.0) بدلاً من الإصدارات الحديثة جداً
    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.0.2
        chmod +x gradlew

    # 5. بناء التطبيق وتخطي ميزات الكاش المسببة للمشاكل
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon

    # 6. رفع ملف الـ APK
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
